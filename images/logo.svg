<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="100%" height="100%">
    <defs>
        <!-- 左侧菱形渐变 (紫色/靛蓝) -->
        <linearGradient id="gradLeft" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6366F1" />
            <stop offset="100%" stop-color="#A855F7" />
        </linearGradient>

        <!-- 右侧菱形渐变 (科技蓝/青色) -->
        <linearGradient id="gradRight" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3B82F6" />
            <stop offset="100%" stop-color="#2DD4BF" />
        </linearGradient>

        <!-- 阴影滤镜 -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="6" stdDeviation="5" flood-color="#1E1B4B" flood-opacity="0.15" />
        </filter>
    </defs>

    <!-- Logo 图形部分 -->
    <g transform="translate(15, 0)">
        <!-- 基础阴影组 -->
        <g filter="url(#shadow)">
            <!-- 左侧重叠模块 (United / Platform) -->
            <g transform="translate(48, 60) rotate(45)">
                <rect x="-24" y="-24" width="48" height="48" rx="14" fill="url(#gradLeft)" opacity="0.95" />
            </g>
            
            <!-- 右侧重叠模块 (United / Platform) -->
            <g transform="translate(72, 60) rotate(45)">
                <rect x="-24" y="-24" width="48" height="48" rx="14" fill="url(#gradRight)" opacity="0.95" />
            </g>
        </g>

        <!-- 中心镂空/白色符号 (Login / 安全认证) -->
        <g transform="translate(0, -1)">
            <!-- 钥匙孔顶部 / 用户头部 -->
            <circle cx="60" cy="51" r="6.5" fill="#FFFFFF" />
            <!-- 钥匙孔底部 / 用户身体 -->
            <path d="M 55.5 60.5 L 64.5 60.5 L 67.5 73.5 A 2 2 0 0 1 65.5 76.5 L 54.5 76.5 A 2 2 0 0 1 52.5 73.5 Z" fill="#FFFFFF" />
        </g>

        <!-- 状态指示灯 (活跃/在线) -->
        <circle cx="98" cy="32" r="4.5" fill="#2DD4BF" stroke="#FFFFFF" stroke-width="2" />
    </g>

    <!-- Logo 文字部分 -->
    <g transform="translate(135, 0)">
        <!-- 主标题 (UNITED) -->
        <text x="0" y="58" 
              font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
              font-size="38" 
              font-weight="900" 
              letter-spacing="2.5" 
              fill="#0F172A">
            UNITED
        </text>

        <!-- 副标题 (LOGIN PLATFORM) -->
        <text x="3" y="85" 
              font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
              font-size="14" 
              font-weight="600" 
              letter-spacing="4" 
              fill="#64748B">
            LOGIN PLATFORM
        </text>
    </g>
</svg>