# spring
spring:
  application:
    name: ULP 统一登录平台门户端
  jackson:
    #日期格式化
    date-format: "yyyy-MM-dd HH:mm:ss"
    #设置空如何序列化
    default-property-inclusion: NON_NULL
    deserialization:
      #允许对象忽略json中不存在的属性
      fail_on_unknown_properties: false
    parser:
      #允许出现单引号
      allow_single_quotes: true
      #允许出现特殊字符和转义符
      allow_unquoted_control_chars: true
    serialization:
      #忽略无法转换的对象
      fail_on_empty_beans: false
      #格式化输出
      indent_output: true
  mvc:
    formcontent:
      filter:
        enabled: true
  cache:
    type: redis
    redis:
      key-prefix: 'ulp'
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  session:
    redis:
      # 由 PortalSessionConfiguration 上的 @EnableRedisIndexedHttpSession 读取；
      # flush-mode (immediate) 与 repository-type (indexed) 由该类用代码而非配置承载，
      # 因为 Spring Boot 4 已移除 spring-boot-session 自动装配。
      namespace: ${spring.cache.redis.key-prefix}:session
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/ulp?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: root
    password: root
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      auto-commit: true
      connection-test-query: SELECT 1
      connection-timeout: 30000
      idle-timeout: 30000
      max-lifetime: 1800000
      maximum-pool-size: 15
      minimum-idle: 5
      pool-name: ulp
  data:
    jpa:
      repositories:
        # SB4 + Hibernate 7: deferred 触发 async EMF bootstrap，与 MultiTenancy.getTenantIdentifierResolver
        # 回调 SpringBeanContainer.getBean 抢 BeanFactory 锁的主线程死锁。改 default 走同步装配。
        bootstrap-mode: default
    #reids
    redis:
      host: 127.0.0.1
      port: 6379
      database: 9
      lettuce:
        pool:
          max-idle: 7
          min-idle: 2
          max-active: 7
          max-wait: -1ms
        shutdown-timeout: 200ms
      timeout: 5000ms
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: true
  main:
    banner-mode: off
#日志配置
logging:
  config: classpath:config/logback-spring.xml
server:
  port: 1989
  shutdown: graceful
  #开启压缩 提高响应速度 减少带宽压力
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,application/javascript,application/json,image/svg+xml
    min-response-size: 1024
  servlet:
    session:
      cookie:
        secure: true
        same-site: none
        name: ulp-portal-cookie
        http-only: true
    encoding:
      charset: UTF-8
  #错误处理
  error:
    include-stacktrace: never
    include-exception: true
    include-message: always
    include-binding-errors: never
  # undertow
  undertow:
    threads:
      io: 32
      worker: 256
    buffer-size: 1024
# spring boot actuator —— 见 openspec/specs/observability/spec.md
# 暴露白名单显式列出；heapdump/threaddump/shutdown 等敏感端点永不暴露。
# /actuator/health/{liveness,readiness} 供 k8s 探针 + docker HEALTHCHECK；
# show-details=always 暴露组件 breakdown，访问权限由 PortalSecurityConfiguration 控制。
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus, loggers, env, mappings
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  info:
    env:
      enabled: true
    build:
      enabled: true
    git:
      enabled: true
      mode: full
# springdoc
springdoc:
  swagger-ui:
    csrf:
      enabled: true
      cookie-name: 'ulp-csrf-cookie'
      header-name: 'ulp-csrf'
    enabled: false
  cache:
    disabled: true
  writer-with-default-pretty-printer: true
# ulp
ulp:
  demo:
    # 公开 demo 站点保护开关：true 时所有 @Preview 写操作返回 403。
    # 自部署 / 本地开发保持 false；仅公开体验站点设 true。
    enabled: false
  security:
    cors:
      # 跨域白名单。空（默认）= 关闭 CORS，适用于前后端同源部署（SPA 与 API 在同一 host）。
      # 仅在前端独立部署到不同 origin 时配置；不允许通配符（与 credentials 组合会让任意网站
      # 读取已认证响应）。示例：
      # allowed-origins: ["https://portal.example.com"]
      allowed-origins: []
