<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
    <defs>
        <!-- 左侧菱形渐变 (紫色/靛蓝) -->
        <linearGradient id="gradLeft" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6366F1" />
            <stop offset="100%" stop-color="#A855F7" />
        </linearGradient>

        <!-- 右侧菱形渐变 (科技蓝/青色) -->
        <linearGradient id="gradRight" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3B82F6" />
            <stop offset="100%" stop-color="#2DD4BF" />
        </linearGradient>

        <!-- 文字渐变 -->
        <linearGradient id="gradText" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6366F1" />
            <stop offset="100%" stop-color="#3B82F6" />
        </linearGradient>

        <!-- 阴影滤镜 -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="6" stdDeviation="5" flood-color="#1E1B4B" flood-opacity="0.15" />
        </filter>

        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&amp;display=swap');
        </style>
    </defs>

    <!-- Logo 图形部分 -->
    <g transform="translate(15, 0)">
        <g filter="url(#shadow)">
            <g transform="translate(48, 60) rotate(45)">
                <rect x="-24" y="-24" width="48" height="48" rx="14" fill="url(#gradLeft)" opacity="0.95" />
            </g>
            <g transform="translate(72, 60) rotate(45)">
                <rect x="-24" y="-24" width="48" height="48" rx="14" fill="url(#gradRight)" opacity="0.95" />
            </g>
        </g>
        <g transform="translate(0, -1)">
            <circle cx="60" cy="51" r="6.5" fill="#FFFFFF" />
            <path d="M 55.5 60.5 L 64.5 60.5 L 67.5 73.5 A 2 2 0 0 1 65.5 76.5 L 54.5 76.5 A 2 2 0 0 1 52.5 73.5 Z" fill="#FFFFFF" />
        </g>
        <circle cx="98" cy="32" r="4.5" fill="#2DD4BF" stroke="#FFFFFF" stroke-width="2" />
    </g>

    <!-- Logo 文字：单行 CamelCase，统一蓝紫渐变 -->
    <g transform="translate(135, 0)">
        <text y="68"
              font-family="'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
              font-size="30"
              font-weight="700"
              fill="url(#gradText)">UnitedLoginPlatform</text>
    </g>
</svg>
