version: '3'

services:
  mysql:
    image: mysql:8.0.33
    container_name: mysql
    environment:
      # 时区上海
      TZ: Asia/Shanghai
      # root 密码
      MYSQL_ROOT_PASSWORD: root
      # 初始化数据库(后续的初始化sql会在这个库执行)
      MYSQL_DATABASE: ulp
    ports:
      - "3306:3306"
    volumes:
      # 数据挂载
      - /docker/mysql/data/:/var/lib/mysql/
      # 配置挂载
      - /docker/mysql/conf/:/etc/mysql/conf.d/
    command:
      # 将mysql8.0默认密码策略 修改为 原先 策略 (mysql8.0对其默认策略做了更改 会导致密码无法匹配)
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --explicit_defaults_for_timestamp=true
      --lower_case_table_names=1
    privileged: true
    network_mode: "host"

  nginx-web:
    image: nginx:1.23.4
    container_name: nginx-web
    environment:
      # 时区上海
      TZ: Asia/Shanghai
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 证书映射
      - /docker/nginx/cert:/etc/nginx/cert
      # 配置文件映射
      - /docker/nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      # 页面目录
      - /docker/nginx/html:/usr/share/nginx/html
      # 日志目录
      - /docker/nginx/log:/var/log/nginx
    privileged: true
    network_mode: "host"
    # 假设 /docker/nginx/conf/nginx.conf 反代 ulp-* 三个 upstream；
    # 等三个后端 healthy 再启 nginx，避免 502 窗口。
    # 若用户的 nginx 用途与 ulp 无关，可删除本段——不影响 ulp 服务自身。
    depends_on:
      ulp-console:
        condition: service_healthy
      ulp-portal:
        condition: service_healthy
      ulp-openapi:
        condition: service_healthy

  redis:
    image: redis:6.2.12
    container_name: redis
    ports:
      - "6379:6379"
    environment:
      # 时区上海
      TZ: Asia/Shanghai
    volumes:
      # 配置文件
      - /docker/redis/conf:/redis/config:rw
      # 数据文件
      - /docker/redis/data/:/redis/data/:rw
    command: "redis-server /redis/config/redis.conf"
    privileged: true
    network_mode: "host"

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    deploy:
      resources:
        limits:
          memory: 2048M
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      RABBITMQ_DEFAULT_USER: rabbit
      RABBITMQ_DEFAULT_PASS: 123456
    privileged: true
    network_mode: "host"
    volumes:
      - /docker/rabbitmq/data:/var/lib/rabbitmq

  # Note: build images locally via `mvn -pl ulp-console spring-boot:build-image` (etc.)
  # or push to your own registry, then update image: refs below.
  ulp-console:
    image: ulp-console:latest
    container_name: ulp-console
    environment:
      # 时区上海
      TZ: Asia/Shanghai
      SERVER_PORT: 1898
    ports:
      - "1898:1898"
    volumes:
      # 配置文件
      - /docker/ulp/conf:/opt/ulp/conf
    privileged: true
    network_mode: "host"
    # 与 Dockerfile HEALTHCHECK 参数一致；docker-compose 显式声明使 `depends_on: service_healthy`
    # 可识别。compose 不继承镜像的 HEALTHCHECK 用于 condition 判断时会 fallback 到 service_started。
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:1898/actuator/health/liveness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ulp-portal:
    image: ulp-portal:latest
    container_name: ulp-portal
    environment:
      # 时区上海
      TZ: Asia/Shanghai
      SERVER_PORT: 1989
    ports:
      - "1989:1989"
    volumes:
      # 配置文件
      - /docker/ulp/conf:/opt/ulp/conf
    privileged: true
    network_mode: "host"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:1989/actuator/health/liveness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ulp-openapi:
    image: ulp-openapi:latest
    container_name: ulp-openapi
    environment:
      # 时区上海
      TZ: Asia/Shanghai
      SERVER_PORT: 1988
    ports:
      - "1988:1988"
    volumes:
      # 配置文件
      - /docker/ulp/conf:/opt/ulp/conf
    privileged: true
    network_mode: "host"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:1988/actuator/health/liveness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
